server:
  address: tcp://0.0.0.0:9091

log:
  level: info

theme: dark

identity_validation:
  reset_password:
    jwt_secret: "${AUTHELIA_JWT_SECRET}"

authentication_backend:
  file:
    path: /config/users_database.yml

access_control:
  default_policy: deny
  rules:
    - domain:
        - "${AUTHELIA_HOST}"
      policy: bypass

    - domain:
        - "${TRAEFIK_DASHBOARD_HOST}"
        - "${PORTAINER_HOST}"
        - "${UPTIME_KUMA_HOST}"
        - "${DOZZLE_HOST}"
      policy: one_factor

session:
  name: authelia_session
  secret: "${AUTHELIA_SESSION_SECRET}"
  expiration: 1h
  inactivity: 5m
  remember_me: 1M
  cookies:
    - domain: "${DOMAIN}"
      authelia_url: "https://${AUTHELIA_HOST}"
      default_redirection_url: "https://${PORTAINER_HOST}"

storage:
  local:
    path: /config/db.sqlite3

notifier:
  filesystem:
    filename: /config/notification.txt