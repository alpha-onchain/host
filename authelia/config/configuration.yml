server:
  address: tcp://0.0.0.0:9091

log:
  level: info

theme: dark

identity_validation:
  reset_password:
    jwt_secret: "${AUTHELIA_JWT_SECRET}"

authentication_backend:
  file:
    path: /config/users_database.yml

access_control:
  default_policy: deny
  rules:
    - domain:
        - auth.example.com
      policy: bypass

    - domain:
        - traefik.example.com
        - portainer.example.com
        - status.example.com
        - logs.example.com
      policy: one_factor

session:
  name: authelia_session
  secret: "CHANGE_THIS_LONG_RANDOM_SESSION_SECRET"
  expiration: 1h
  inactivity: 5m
  remember_me: 1M
  cookies:
    - domain: example.com
      authelia_url: https://auth.example.com
      default_redirection_url: https://portainer.example.com

storage:
  local:
    path: /config/db.sqlite3

notifier:
  filesystem:
    filename: /config/notification.txt