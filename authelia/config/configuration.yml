server:
  address: tcp://0.0.0.0:9091

log:
  level: info

theme: dark

identity_validation:
  reset_password:
    jwt_secret: '{{ env "AUTH_JWT_SECRET" }}'

authentication_backend:
  file:
    path: /config/users_database.yml

access_control:
  default_policy: deny
  rules:
    - domain:
        - '{{ env "AUTH_HOST" }}'
      policy: bypass

    - domain:
        - '{{ env "APP_TRAEFIK_DASHBOARD_HOST" }}'
        - '{{ env "APP_PORTAINER_HOST" }}'
        - '{{ env "APP_UPTIME_KUMA_HOST" }}'
        - '{{ env "APP_DOZZLE_HOST" }}'
      policy: one_factor

session:
  name: authelia_session
  secret: '{{ env "AUTH_SESSION_SECRET" }}'
  expiration: 1h
  inactivity: 5m
  remember_me: 1M
  cookies:
    - domain: '{{ env "AUTH_DOMAIN" }}'
      authelia_url: 'https://{{ env "AUTH_HOST" }}'
      default_redirection_url: 'https://{{ env "APP_PORTAINER_HOST" }}'

storage:
  encryption_key: '{{ env "AUTH_STORAGE_ENCRYPTION_KEY" }}'
  local:
    path: /config/db.sqlite3

notifier:
  filesystem:
    filename: /config/notification.txt
