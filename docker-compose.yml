name: infra

services:
  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command:
      - --global.checkNewVersion=false
      - --global.sendAnonymousUsage=false

      - --api.dashboard=true
      - --api.insecure=false

      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --entrypoints.web.http.redirections.entryPoint.permanent=true
      - --entrypoints.websecure.address=:443

      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true

      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web

      - --log.level=INFO
      - --accesslog=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/letsencrypt:/letsencrypt
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - proxy
    labels:
      - traefik.enable=true

      # Traefik dashboard protected by Authelia
      - traefik.http.routers.traefik.rule=Host(`${TRAEFIK_DASHBOARD_HOST}`)
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.tls.certresolver=letsencrypt
      - traefik.http.routers.traefik.service=api@internal
      - traefik.http.routers.traefik.middlewares=security-headers@file,authelia@docker

  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./authelia/config:/config
    environment:
      TZ: ${TZ}
      X_AUTHELIA_CONFIG_FILTERS: template
      AUTH_ADMIN_PASSWORD: ${AUTHELIA_ADMIN_PASSWORD}
      AUTH_JWT_SECRET: ${AUTHELIA_JWT_SECRET}
      AUTH_SESSION_SECRET: ${AUTHELIA_SESSION_SECRET}
      AUTH_STORAGE_ENCRYPTION_KEY: ${AUTHELIA_STORAGE_ENCRYPTION_KEY}
      AUTH_HOST: ${AUTHELIA_HOST}
      APP_DOZZLE_HOST: ${DOZZLE_HOST}
      APP_PORTAINER_HOST: ${PORTAINER_HOST}
      APP_UPTIME_KUMA_HOST: ${UPTIME_KUMA_HOST}
      APP_AOC_PUBLISHER_HOST: ${AOC_PUBLISHER_HOST}
      APP_TRAEFIK_DASHBOARD_HOST: ${TRAEFIK_DASHBOARD_HOST}
      AUTH_DOMAIN: ${DOMAIN}
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.authelia.rule=Host(`${AUTHELIA_HOST}`)
      - traefik.http.routers.authelia.entrypoints=websecure
      - traefik.http.routers.authelia.tls.certresolver=letsencrypt
      - traefik.http.routers.authelia.middlewares=security-headers@file
      - traefik.http.services.authelia.loadbalancer.server.port=9091

      # ForwardAuth middleware exposed to other containers
      - traefik.http.middlewares.authelia.forwardauth.address=http://authelia:9091/api/authz/forward-auth
      - traefik.http.middlewares.authelia.forwardauth.trustForwardHeader=true
      - traefik.http.middlewares.authelia.forwardauth.authResponseHeaders=Remote-User,Remote-Groups,Remote-Name,Remote-Email

  portainer:
    image: portainer/portainer-ce:lts
    container_name: portainer
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: -H unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/portainer:/data
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.portainer.rule=Host(`${PORTAINER_HOST}`)
      - traefik.http.routers.portainer.entrypoints=websecure
      - traefik.http.routers.portainer.tls.certresolver=letsencrypt
      - traefik.http.routers.portainer.middlewares=security-headers@file,authelia@docker
      - traefik.http.services.portainer.loadbalancer.server.port=9000

  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./data/uptime-kuma:/app/data
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.uptime-kuma.rule=Host(`${UPTIME_KUMA_HOST}`)
      - traefik.http.routers.uptime-kuma.entrypoints=websecure
      - traefik.http.routers.uptime-kuma.tls.certresolver=letsencrypt
      - traefik.http.routers.uptime-kuma.middlewares=security-headers@file,authelia@docker
      - traefik.http.services.uptime-kuma.loadbalancer.server.port=3001

  aoc-publisher:
    build: ./aoc-publisher
    container_name: aoc-publisher
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      PORT: 3001
      TG_BOT_TOKEN: ${TG_BOT_TOKEN}
      TG_BOT_ADMINISTRATOR_GROUP_ID: ${TG_BOT_ADMINISTRATOR_GROUP_ID}
      TG_BOT_API_ID: ${TG_BOT_API_ID}
      TG_BOT_API_HASH: ${TG_BOT_API_HASH}
      TG_PUBLISHER_USER_NAME: ${TG_PUBLISHER_USER_NAME}
      DATA_DIRECTORY_PATH: ${DATA_DIRECTORY_PATH}
    volumes:
      - ./aoc-publisher/data:/app/data
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.aoc-publisher.rule=Host(`${AOC_PUBLISHER_HOST}`)
      - traefik.http.routers.aoc-publisher.entrypoints=websecure
      - traefik.http.routers.aoc-publisher.tls.certresolver=letsencrypt
      - traefik.http.routers.aoc-publisher.middlewares=security-headers@file,authelia@docker
      - traefik.http.services.aoc-publisher.loadbalancer.server.port=3001

  dozzle:
    image: amir20/dozzle:v8
    container_name: dozzle
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      DOZZLE_LEVEL: info
      DOZZLE_TAILSIZE: 300
      DOZZLE_NO_ANALYTICS: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.dozzle.rule=Host(`${DOZZLE_HOST}`)
      - traefik.http.routers.dozzle.entrypoints=websecure
      - traefik.http.routers.dozzle.tls.certresolver=letsencrypt
      - traefik.http.routers.dozzle.middlewares=security-headers@file,authelia@docker
      - traefik.http.services.dozzle.loadbalancer.server.port=8080

networks:
  proxy:
    name: proxy