name: infra

services:
  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command:
      - --global.checkNewVersion=false
      - --global.sendAnonymousUsage=false

      - --api.dashboard=true
      - --api.insecure=false

      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --entrypoints.web.http.redirections.entryPoint.permanent=true
      - --entrypoints.websecure.address=:443

      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true

      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web

      - --log.level=INFO
      - --accesslog=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/letsencrypt:/letsencrypt
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - proxy
    labels:
      - traefik.enable=true

      # Traefik dashboard protected by Authentik
      - traefik.http.routers.traefik.rule=Host(`${TRAEFIK_DASHBOARD_HOST}`)
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.tls.certresolver=letsencrypt
      - traefik.http.routers.traefik.service=api@internal
      - traefik.http.routers.traefik.middlewares=security-headers@file,authentik@file

  postgresql:
    image: postgres:16-alpine
    container_name: authentik-postgresql
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: ${PG_DB}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASS}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - authentik-database:/var/lib/postgresql/data
    networks:
      - proxy

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - proxy

  authentik-server:
    image: ghcr.io/goauthentik/server:2025.10
    container_name: authentik-server
    command: server
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_LOG_LEVEL: info
      AUTHENTIK_DISABLE_UPDATE_CHECK: "true"
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB}
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_POSTGRESQL__SSLMODE: disable
    volumes:
      - ./authentik/data:/data
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.services.authentik.loadbalancer.server.port=9000
      - traefik.http.routers.authentik.rule=Host(`${AUTH_HOST}`) || Host(`${AUTH_HOST_AOC_PORTAL}`)
      - traefik.http.routers.authentik.entrypoints=websecure
      - traefik.http.routers.authentik.tls.certresolver=letsencrypt
      - traefik.http.routers.authentik.middlewares=security-headers@file
      - traefik.http.routers.authentik.service=authentik
      - traefik.http.routers.authentik-outpost.rule=PathPrefix(`/outpost.goauthentik.io/`)
      - traefik.http.routers.authentik-outpost.entrypoints=websecure
      - traefik.http.routers.authentik-outpost.tls.certresolver=letsencrypt
      - traefik.http.routers.authentik-outpost.priority=100
      - traefik.http.routers.authentik-outpost.service=authentik

  authentik-worker:
    image: ghcr.io/goauthentik/server:2025.10
    container_name: authentik-worker
    command: worker
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_LOG_LEVEL: info
      AUTHENTIK_DISABLE_UPDATE_CHECK: "true"
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB}
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_POSTGRESQL__SSLMODE: disable
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD}
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL}
    volumes:
      - ./authentik/data:/data
    networks:
      - proxy

  portainer:
    image: portainer/portainer-ce:lts
    container_name: portainer
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: -H unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/portainer:/data
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.portainer.rule=Host(`${PORTAINER_HOST}`)
      - traefik.http.routers.portainer.entrypoints=websecure
      - traefik.http.routers.portainer.tls.certresolver=letsencrypt
      - traefik.http.routers.portainer.middlewares=security-headers@file
      - traefik.http.services.portainer.loadbalancer.server.port=9000

  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./data/uptime-kuma:/app/data
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.uptime-kuma.rule=Host(`${UPTIME_KUMA_HOST}`)
      - traefik.http.routers.uptime-kuma.entrypoints=websecure
      - traefik.http.routers.uptime-kuma.tls.certresolver=letsencrypt
      - traefik.http.routers.uptime-kuma.middlewares=security-headers@file,authentik@file
      - traefik.http.services.uptime-kuma.loadbalancer.server.port=3001

  aoc-portal:
    build: ./aoc-portal
    container_name: aoc-portal
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      PORT: 3002
      AOC_HOST: ${AOC_PORTAL_HOST}
      USER_ADMIN_GROUP: ${AOC_USER_ADMIN_GROUP}
      AUTHENTIK_HOST: ${AUTH_HOST_AOC_PORTAL}
      DATA_DIRECTORY_PATH: ${DATA_DIRECTORY_PATH}
      DATABASE_URL: ${AOC_PORTAL_DATABASE_URL}
    volumes:
      - ./aoc-portal/data:/app/data
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.aoc-portal.rule=Host(`${AOC_PORTAL_HOST}`)
      - traefik.http.routers.aoc-portal.entrypoints=websecure
      - traefik.http.routers.aoc-portal.tls.certresolver=letsencrypt
      - traefik.http.routers.aoc-portal.middlewares=security-headers@file,authentik@file
      - traefik.http.services.aoc-portal.loadbalancer.server.port=3002

  aoc-publisher:
    build: ./aoc-publisher
    container_name: aoc-publisher
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      PORT: 3001
      TG_BOT_TOKEN: ${TG_BOT_TOKEN}
      TG_BOT_ADMINISTRATOR_GROUP_ID: ${TG_BOT_ADMINISTRATOR_GROUP_ID}
      TG_BOT_API_ID: ${TG_BOT_API_ID}
      TG_BOT_API_HASH: ${TG_BOT_API_HASH}
      TG_PUBLISHER_USER_NAME: ${TG_PUBLISHER_USER_NAME}
      DATA_DIRECTORY_PATH: ${DATA_DIRECTORY_PATH}
      DATABASE_URL: ${AOC_DATABASE_URL}
      AOC_HOST: ${AOC_PUBLISHER_HOST}
      USER_ADMIN_GROUP: ${AOC_USER_ADMIN_GROUP}
      AUTHENTIK_HOST: ${AUTH_HOST}
      REDIS_URL: ${REDIS_URL}
    volumes:
      - ./aoc-publisher/data:/app/data
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.aoc-publisher.rule=Host(`${AOC_PUBLISHER_HOST}`)
      - traefik.http.routers.aoc-publisher.entrypoints=websecure
      - traefik.http.routers.aoc-publisher.tls.certresolver=letsencrypt
      - traefik.http.routers.aoc-publisher.middlewares=security-headers@file,authentik@file
      - traefik.http.services.aoc-publisher.loadbalancer.server.port=3001

  dozzle:
    image: amir20/dozzle:v8
    container_name: dozzle
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      DOZZLE_LEVEL: info
      DOZZLE_TAILSIZE: 300
      DOZZLE_NO_ANALYTICS: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.dozzle.rule=Host(`${DOZZLE_HOST}`)
      - traefik.http.routers.dozzle.entrypoints=websecure
      - traefik.http.routers.dozzle.tls.certresolver=letsencrypt
      - traefik.http.routers.dozzle.middlewares=security-headers@file,authentik@file
      - traefik.http.services.dozzle.loadbalancer.server.port=8080

networks:
  proxy:
    name: proxy

volumes:
  authentik-database:
  redis-data: